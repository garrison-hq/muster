# Skills conformance example manifest — muster 1.0.0 OSS release.
# Run from repo root: node dist/cli/index.js skills run examples/skills/manifest.yaml
#
# Static cases run offline. Behavioral trigger-routing cases require MUSTER_ENDPOINT
# and are skipped gracefully when it is absent.
#
# skillDir paths are relative to the repo root (cwd when invoked from there).

cases:
  - id: example-valid-minimal
    type: static
    skillDir: examples/skills/valid/minimal
    profile: base
    expectations:
      ok: true
      violations: []

# Skills conformance example manifest for muster.
# Run: muster skills run examples/skills/manifest.yaml (from anywhere)
#
# Static cases run offline. Behavioral trigger-routing cases require MUSTER_ENDPOINT
# and are skipped gracefully when it is absent.
#
# skillDir paths are relative to this manifest's own directory.

cases:
  - id: example-valid-minimal
    type: static
    skillDir: valid/minimal
    profile: base
    expectations:
      ok: true
      violations: []

sonar.projectKey=garrison-hq_muster
sonar.organization=garrison-hq
sonar.sources=src
sonar.tests=tests
sonar.exclusions=dist/**,node_modules/**,site/**,kitty-specs/**,.kittify/**,behave/**,cts/**,souls/**
# Pin the TypeScript analyzer to the root tsconfig so it does not auto-discover
# site/tsconfig.json (which `extends astro/tsconfigs/strict` from site/node_modules,
# not installed in the CI sonar job → "referenced/extended tsconfig not found").
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=tests/**

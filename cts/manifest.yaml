# ── supplementary: §25 keyspace / §5.2.1 ────────────────────────────────────

- id: "keyspace_unknown_key_strict"
  root: "fixtures/profiles/unknown_key/Soul.md"
  mode: strict
  expect_ok: false
  expect_errors:
    - path: "mood_engine"
      message: "unknown top-level key outside RFC-1 keyspace"

# §25/§5.2.1: permissive mode MUST ignore the unknown key (MAY warn) — the
# document loads OK. No expect_effective_json: this case tests load
# acceptance, not resolution semantics.
- id: "keyspace_unknown_key_permissive"
  root: "fixtures/profiles/unknown_key/Soul.md"
  mode: permissive
  expect_ok: true

# ── cat 8: state/ ───────────────────────────────────────────────────────────

- id: "state_base_explicit"
  root: "fixtures/state/base_explicit/Soul.md"
  mode: strict
  expect_ok: true
  expect_effective_json: "fixtures/state/base_explicit/expected.json"

# Named so a failure message teaches the rule: with state.base omitted, the
# fallback is the lexicographically smallest state key in UTF-8 byte order
# (§4.4) — "alpha" wins over the first-authored "zeta".
- id: "state_base_fallback_lexicographic_alpha_wins"
  root: "fixtures/state/base_fallback_lexicographic/Soul.md"
  mode: strict
  expect_ok: true
  expect_effective_json: "fixtures/state/base_fallback_lexicographic/expected.json"

- id: "state_bad_base"
  root: "fixtures/state/bad_base/Soul.md"
  mode: strict
  expect_ok: false
  expect_errors:
    - path: "state.base"
      message: "does not reference a key in state.states"

- id: "state_trigger_unknown_state_strict"
  root: "fixtures/state/trigger_unknown_state/Soul.md"
  mode: strict
  expect_ok: false
  expect_errors:
    - path: "state.triggers[0].shift_to"
      message: "does not exist in state.states"

# §20.3.7 permissive twin: the invalid trigger is ignored with a warning and
# loading proceeds — the warm base overlay still applies (§20.1).
- id: "state_trigger_unknown_state_permissive"
  root: "fixtures/state/trigger_unknown_state/Soul.md"
  mode: permissive
  expect_ok: true
  expect_effective_json: "fixtures/state/trigger_unknown_state/expected.json"


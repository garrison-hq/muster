version: 2
updates:
  # Root package: the muster CLI/library (pnpm).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      # chore(deps) → no release (semantic-release runs on main).
      prefix: chore
    groups:
      dev-dependencies:
        dependency-type: development

  # The documentation site is a separate package.
  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsc strict)
        run: pnpm build

      - name: Test (unit + CTS fixture suite, offline)
        run: pnpm test

      # Smoke-test the built binary: the static path must work end to end and
      # never touch the network.
      - name: CLI smoke
        run: |
          node dist/cli/index.js check souls/voice-frontdesk/Soul.md
          node dist/cli/index.js cts run cts/manifest.yaml

name: Release

# Runs semantic-release after the CI workflow succeeds on main. semantic-release
# reads Conventional Commit messages to compute the next version, updates the
# CHANGELOG, publishes to npm, and creates the GitHub release + tag.
#
# Required repository secrets:
#   NPM_TOKEN  — an npm automation token with publish rights to @garrison-hq/*
#                (GITHUB_TOKEN is provided automatically by Actions).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write       # create tags/releases and commit CHANGELOG + version
  issues: write         # comment on released issues
  pull-requests: write  # comment on released PRs
  id-token: write       # npm provenance

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Only release when the triggering CI run actually succeeded (workflow_dispatch
    # has no workflow_run payload, so allow it through too).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0          # full history for commit analysis
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
          # No registry-url here: it writes an .npmrc expecting NODE_AUTH_TOKEN,
          # which conflicts with @semantic-release/npm's own NPM_TOKEN auth.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsc strict)
        run: pnpm build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

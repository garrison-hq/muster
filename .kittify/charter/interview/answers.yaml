schema_version: 1.0.0
mission: software-dev
profile: minimal
answers:
  project_intent: Ship the reference CTS-1 conformance harness for Soul.md RFC-1
    in a ~2-day spec-driven build. Static conformance spine must be complete
    end-to-end (parse, validate, composition-resolve, report); behavioral
    conformance is a thin slice limited to three objectively-gradable axes.
    The fixture set is shaped as an upstream contribution to the unbuilt CTS-1
    fixture repository.
  languages_frameworks: TypeScript on Node 22 LTS, npm, single package. Minimal
    dependencies (yaml for AST-level parsing, Ajv for JSON Schema Draft 2020-12,
    commander for CLI, Vitest for tests). No model-provider SDKs - models are
    reached via plain fetch against OpenAI-compatible endpoints only.
  testing_requirements: Vitest is the test runner. The CTS fixture suite is the
    primary acceptance suite and must pass fully; merge/resolution core logic
    gets focused unit tests. Every conformance test traces to an RFC-1 section
    cited in its name or description. No minimum coverage gate.
  quality_gates: Before merge - strict TypeScript type-check (tsc) passes, full
    Vitest suite green including the CTS fixture suite, no implementation code
    lands before spec, plan, and tasks are locked through the spec-kitty
    checklist.
  review_policy: Solo developer driving an AI pair. Each work package is
    self-reviewed via spec-kitty review before acceptance; one approval (the
    project owner) before merge.
  performance_targets: Single-soul static check completes in under 5 seconds.
    Full static fixture suite completes in under 10 seconds. Behavioral suite
    under 15 minutes against a local 7B model. Static checks require zero
    network access.
  deployment_constraints: Linux (Fedora) is the primary developer environment.
    Static checking must work fully offline. No hardcoded model providers and
    no credentials in the repository - endpoints are configured at run time.
